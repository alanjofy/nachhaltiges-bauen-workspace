<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO₂ Compass — Calibrating</title>
<meta name="description" content="CO₂ Compass — Understand, Navigate, Reduce. Lindner Nachhaltiges Bauen.">
<link rel="icon" href="compass-body.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lindner-theme.css">

<!-- Preload main.html's heavy assets while ceremony plays -->
<link rel="preload" href="co2-compass-wordmark.png" as="image">
<link rel="prefetch" href="main.html">

<style>
  body { overflow: hidden; }

  /* ====== STAGE ====== */
  .loading-stage {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    transition: opacity 0.5s ease;
  }

  /* ====== COMPASS — hero of this page ====== */
  .compass-mark {
    position: relative;
    width: 260px;
    height: 260px;
    flex-shrink: 0;
    will-change: transform, opacity;
  }

  /* ACT 1: Body fades in blurry → sharp (UNDERSTAND) */
  .compass-body {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    filter: blur(8px) brightness(0.7);
    animation: bodyUnderstand 1.0s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
  }
  @keyframes bodyUnderstand {
    0% {
      opacity: 0;
      filter: blur(8px) brightness(0.7);
      transform: scale(0.92);
    }
    60% {
      opacity: 0.85;
      filter: blur(2px) brightness(0.95);
    }
    100% {
      opacity: 1;
      filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.55))
              drop-shadow(0 0 8px rgba(255, 255, 255, 0.18))
              blur(0) brightness(1.06) contrast(1.05);
      transform: scale(1);
    }
  }

  /* ACT 2: Needle calibrates (NAVIGATE) */
  .compass-needle {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transform-origin: center center;
    transform: scale(0.7);
    animation: needleNavigate 1.4s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5))
            drop-shadow(0 0 4px rgba(255, 255, 255, 0.2))
            brightness(1.08);
  }
  @keyframes needleNavigate {
    0%   { opacity: 0; transform: scale(0.7) rotate(140deg); }
    15%  { opacity: 1; transform: scale(0.7) rotate(140deg); }
    35%  { transform: scale(0.7) rotate(-160deg); }
    55%  { transform: scale(0.7) rotate(50deg); }
    72%  { transform: scale(0.7) rotate(-20deg); }
    85%  { transform: scale(0.7) rotate(10deg); }
    93%  { transform: scale(0.7) rotate(-3deg); }
    100% { opacity: 1; transform: scale(0.7) rotate(0deg); }
  }

  /* ACT 2 finale: Hub "lock confirmed" red pulse */
  .compass-mark::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(232, 0, 31, 0.75) 0%,
      rgba(232, 0, 31, 0.25) 40%,
      transparent 70%);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    animation: hubLock 0.9s ease-out 2.4s forwards;
    z-index: 3;
  }
  @keyframes hubLock {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    40%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(2.4); }
  }

  /* ACT 3: Green wash tint on compass (REDUCE) */
  .compass-mark::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center,
      rgba(120, 200, 140, 0.18) 0%,
      transparent 60%);
    opacity: 0;
    pointer-events: none;
    animation: reduceWash 1.2s ease-in-out 2.6s forwards;
    z-index: 2;
    border-radius: 50%;
  }
  @keyframes reduceWash {
    0%   { opacity: 0; }
    40%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ====== MOTTO ACTS — three words appearing sequentially ====== */
  .motto-acts {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 7px;
    text-transform: uppercase;
    min-height: 32px;
  }
  .act {
    opacity: 0;
    transform: translateY(8px);
    display: inline-block;
    color: var(--text-primary);
  }
  .act-dot {
    opacity: 0;
    color: var(--text-dim);
    font-size: 16px;
  }

  /* ACT 1: UNDERSTAND (0.4s) */
  .act-1 { animation: actIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards; }
  .act-dot-1 { animation: actIn 0.4s ease 1.0s forwards; }

  /* ACT 2: NAVIGATE — red with glow (1.4s) */
  .act-2 {
    color: var(--accent-red-bright);
    animation: actIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.4s forwards,
               navigatePulse 1.5s ease-in-out 2.0s 2;
  }
  @keyframes navigatePulse {
    0%, 100% { text-shadow: 0 0 12px rgba(232, 0, 31, 0.4); }
    50%      { text-shadow: 0 0 28px rgba(232, 0, 31, 0.7),
                            0 0 48px rgba(232, 0, 31, 0.3); }
  }
  .act-dot-2 { animation: actIn 0.4s ease 2.4s forwards; }

  /* ACT 3: REDUCE (2.6s) */
  .act-3 { animation: actIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 2.6s forwards; }

  @keyframes actIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ====== WORDMARK at the end (3.0s) ====== */
  .brand-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transform: translateY(6px);
    animation: brandTextIn 0.6s ease 3.0s forwards;
  }
  @keyframes brandTextIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .brand-text-main {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 5px;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  .brand-text-sub {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ====== SKIP LINK — bottom-right ====== */
  .skip-link {
    position: fixed;
    bottom: 28px;
    right: 32px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.0s forwards;
    transition: color 0.3s ease, gap 0.3s ease;
    font-family: var(--font-body);
  }
  .skip-link:hover { color: var(--text-primary); gap: 12px; }
  .skip-link:focus-visible {
    color: var(--text-primary);
    outline: 1px solid var(--accent-red-bright);
    outline-offset: 4px;
    border-radius: 4px;
  }
  .skip-link svg {
    width: 10px; height: 10px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ====== REPLAY BUTTON — bottom-left (for testing) ====== */
  .replay-link {
    position: fixed;
    bottom: 28px;
    left: 32px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.0s forwards;
    transition: color 0.3s ease, gap 0.3s ease;
    font-family: var(--font-body);
  }
  .replay-link:hover { color: var(--text-primary); gap: 12px; }
  .replay-link:focus-visible {
    color: var(--text-primary);
    outline: 1px solid var(--accent-red-bright);
    outline-offset: 4px;
    border-radius: 4px;
  }
  .replay-link svg {
    width: 11px; height: 11px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.5s ease;
  }
  .replay-link:hover svg { transform: rotate(-180deg); }

  /* ====== EXIT TRANSITION ====== */
  .loading-stage.exit-bg { opacity: 0; }

  /* ====== REDUCED MOTION ====== */
  @media (prefers-reduced-motion: reduce) {
    .compass-body, .compass-needle, .compass-mark::after, .compass-mark::before,
    .act, .act-dot, .brand-text, .skip-link, .replay-link {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
    }
    .compass-needle { transform: scale(0.7) !important; }
    .compass-body {
      filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.55))
              drop-shadow(0 0 8px rgba(255, 255, 255, 0.18))
              brightness(1.06) contrast(1.05) !important;
    }
  }

  /* ====== MOBILE ====== */
  @media (max-width: 600px) {
    .compass-mark { width: 200px; height: 200px; }
    .motto-acts { font-size: 16px; letter-spacing: 5px; gap: 12px; }
    .brand-text-main { font-size: 14px; letter-spacing: 4px; }
    .brand-text-sub { font-size: 8px; letter-spacing: 3px; }
    .skip-link, .replay-link { bottom: 20px; }
    .skip-link { right: 20px; }
    .replay-link { left: 20px; }
  }
</style>
</head>
<body>

<div class="lindner-bg"></div>
<div class="lindner-grain"></div>

<!-- LOADING STAGE -->
<div class="loading-stage" id="stage">

  <!-- COMPASS — hero -->
  <div class="compass-mark" id="compass" aria-hidden="true">
    <img class="compass-body" src="compass-body.png" alt="">
    <img class="compass-needle" src="compass-needle.png" alt="">
  </div>

  <!-- MOTTO — three acts -->
  <div class="motto-acts" aria-label="Understand, Navigate, Reduce">
    <span class="act act-1">Understand</span>
    <span class="act-dot act-dot-1">·</span>
    <span class="act act-2">Navigate</span>
    <span class="act-dot act-dot-2">·</span>
    <span class="act act-3">Reduce</span>
  </div>

  <!-- BRAND TEXT — appears at end -->
  <div class="brand-text" id="brandText">
    <div class="brand-text-main">CO₂ Compass</div>
    <div class="brand-text-sub">Lindner · Nachhaltiges Bauen</div>
  </div>

</div>

<!-- SKIP BUTTON -->
<button class="skip-link" id="skipBtn" aria-label="Skip intro and continue">
  Skip
  <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
</button>

<!-- REPLAY BUTTON (for testing) -->
<button class="replay-link" id="replayBtn" aria-label="Replay intro animation">
  <svg viewBox="0 0 24 24">
    <path d="M1 4v6h6"/>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
  </svg>
  Replay
</button>

<script>
  (function() {
    const stage = document.getElementById('stage');
    const skipBtn = document.getElementById('skipBtn');
    const replayBtn = document.getElementById('replayBtn');

    // Destination — from URL param or default
    const params = new URLSearchParams(window.location.search);
    const destination = params.get('to') || 'main.html';

    // ====== FAST PATH — already seen ceremony this session ======
    const seen = sessionStorage.getItem('compass-introduced');
    if (seen) {
      sessionStorage.setItem('compass-handoff', Date.now().toString());
      window.location.replace(destination);
      return;
    }

    // ====== FIRST VISIT — full ceremony ======
    let exited = false;

    function triggerExit() {
      if (exited) return;
      exited = true;

      sessionStorage.setItem('compass-introduced', '1');
      sessionStorage.setItem('compass-handoff', Date.now().toString());

      stage.classList.add('exit-bg');
      skipBtn.style.opacity = '0';
      skipBtn.style.pointerEvents = 'none';
      replayBtn.style.opacity = '0';
      replayBtn.style.pointerEvents = 'none';

      setTimeout(() => {
        window.location.replace(destination);
      }, 500);
    }

    // ====== AUTO-EXIT at 3.8s ======
    const autoExitTimer = setTimeout(triggerExit, 3800);

    // ====== SKIP BUTTON ======
    skipBtn.addEventListener('click', () => {
      clearTimeout(autoExitTimer);
      triggerExit();
    });

    // ====== REPLAY BUTTON (testing tool) ======
    replayBtn.addEventListener('click', () => {
      clearTimeout(autoExitTimer);
      sessionStorage.removeItem('compass-introduced');
      sessionStorage.removeItem('compass-handoff');
      window.location.reload();
    });

    // ====== KEYBOARD SKIP — Enter / Space / Escape ======
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape') {
        clearTimeout(autoExitTimer);
        triggerExit();
      }
    });

    // ====== REDUCED MOTION — instant transition ======
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      clearTimeout(autoExitTimer);
      sessionStorage.setItem('compass-introduced', '1');
      sessionStorage.setItem('compass-handoff', Date.now().toString());
      setTimeout(() => window.location.replace(destination), 600);
    }
  })();
</script>

</body>
</html>
