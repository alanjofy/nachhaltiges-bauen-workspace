<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Logo Animation</title>
<link rel="prefetch" href="../REtool/index.html">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #2b343b 0%, #41505b 55%, #2f3940 100%);
    position: relative;
  }
  body::before,
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  body::before {
    background:
      linear-gradient(115deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 32%),
      linear-gradient(128deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 40%),
      linear-gradient(148deg, rgba(0,0,0,0.10)   0%, rgba(0,0,0,0)   45%);
  }
  body::after {
    background:
      linear-gradient(200deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0) 38%),
      linear-gradient(20deg,  rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 50%);
  }

  .stage { position: relative; width: 600px; height: 640px; z-index: 1; }
  .logo  { width: 600px; height: 640px; position: absolute; inset: 0; z-index: 1; }

  #particles {
    position: absolute;
    top: -150px; left: -150px;
    width: 900px; height: 940px;
    pointer-events: none;
    z-index: 2;
  }

  .ring-group {
    transform-origin: 250px 250px;
    will-change: transform;
    filter: drop-shadow(0 6px 6px rgba(0,0,0,0.4));
  }

  /* Ring body fades in slightly before the trace finishes, so they blend */
  .ring-fill { opacity: 0; }
  .reveal-ring .ring-fill {
    animation: ringFade 1.4s ease-out forwards;
    animation-delay: 2.8s;
  }
  @keyframes ringFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Glowing trace — sharp stroke + separate blurred glow copy */
  .trace {
    fill: none;
    stroke: #cfe2ec;
    stroke-width: 30;
    stroke-linecap: round;
    stroke-dasharray: 1005;
    stroke-dashoffset: 1005;
  }
  .trace-glow {
    fill: none;
    stroke: #9fc4d6;
    stroke-width: 34;
    stroke-linecap: round;
    stroke-dasharray: 1005;
    stroke-dashoffset: 1005;
    opacity: 0.6;
    filter: blur(8px);
  }
  .reveal-ring .trace,
  .reveal-ring .trace-glow {
    animation: drawRing 3.4s cubic-bezier(0.25, 0.6, 0.3, 1) forwards,
               traceFade 1.2s ease-out 3.0s forwards;
  }
  @keyframes drawRing {
    from { stroke-dashoffset: 1005; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes traceFade {
    to { opacity: 0; }
  }

  .seg-text {
    fill: #ffffff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    dominant-baseline: central;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.25);
    stroke-width: 2px;
  }

  /* building fade in */
  .building {
    opacity: 0;
    will-change: opacity;
    transition: opacity 1.2s ease-out;
  }
  .reveal-on .building { opacity: 1; }

  /* RE Tool title — independent timing */
  .brand-title {
    fill: #ffffff;
    font-size: 46px;
    font-weight: 700;
    letter-spacing: 3px;
    text-anchor: middle;
    opacity: 0;
    will-change: opacity;
    transition: opacity 1.2s ease-out;
    transition-delay: 0.4s;          /* "RE Tool" timing */
  }
  /* subtitle — independent (later) timing */
  .brand-sub {
    fill: #c4d4dd;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 2px;
    text-anchor: middle;
    opacity: 0;
    will-change: opacity;
    transition: opacity 1.2s ease-out;
    transition-delay: 1.0s;          /* "by Nachhaltiges Bauen" timing */
  }
  .reveal-on .brand-title,
  .reveal-on .brand-sub { opacity: 1; }

  .edge        { stroke: #eaf2f6; stroke-width: 2;   fill: none; stroke-linejoin: round; stroke-linecap: round; }
  .mullion     { stroke: #c4d4dd; stroke-width: .9;  fill: none; opacity: .55; }
  .mullion-side{ stroke: #5d717c; stroke-width: .9;  fill: none; opacity: .55; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <svg class="logo" viewBox="0 0 500 560">
    <defs>
      <path id="topArc"   d="M 90 250 A 160 160 0 0 1 410 250" fill="none"/>
      <path id="rightArc" d="M 410 250 A 160 160 0 0 1 250 410" fill="none"/>
      <path id="leftArc"  d="M 250 410 A 160 160 0 0 1 90 250" fill="none"/>
      <radialGradient id="gRing" cx="250" cy="250" r="175" gradientUnits="userSpaceOnUse">
        <stop offset="0%"    stop-color="#3c4d58"/>
        <stop offset="74%"   stop-color="#3c4d58"/>
        <stop offset="80%"   stop-color="#6f8794"/>
        <stop offset="89%"   stop-color="#5a6f7c"/>
        <stop offset="96%"   stop-color="#3a4953"/>
        <stop offset="100%"  stop-color="#2c373f"/>
      </radialGradient>
      <radialGradient id="gRingLight" cx="200" cy="190" r="220" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
        <stop offset="45%"  stop-color="rgba(255,255,255,0.06)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <linearGradient id="gRoof" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#aebfc9"/><stop offset="100%" stop-color="#8395a1"/>
      </linearGradient>
      <linearGradient id="gFront" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#5d7180"/><stop offset="100%" stop-color="#475863"/>
      </linearGradient>
      <linearGradient id="gSide" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#33414a"/><stop offset="100%" stop-color="#222c33"/>
      </linearGradient>
      <radialGradient id="gShadow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(0,0,0,0.45)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </radialGradient>
    </defs>

    <!-- 3D RING (revealed by tracing) -->
    <g class="ring-group">

      <g class="ring-fill">
        <g>
          <path d="M 75 250 A 175 175 0 0 1 425 250 L 395 250 A 145 145 0 0 0 105 250 Z" fill="url(#gRing)"/>
          <path d="M 425 250 A 175 175 0 0 1 250 425 L 250 395 A 145 145 0 0 0 395 250 Z" fill="url(#gRing)"/>
          <path d="M 250 425 A 175 175 0 0 1 75 250 L 105 250 A 145 145 0 0 0 250 395 Z" fill="url(#gRing)"/>
        </g>
        <g>
          <path d="M 75 250 A 175 175 0 0 1 425 250 L 395 250 A 145 145 0 0 0 105 250 Z" fill="url(#gRingLight)"/>
          <path d="M 425 250 A 175 175 0 0 1 250 425 L 250 395 A 145 145 0 0 0 395 250 Z" fill="url(#gRingLight)"/>
          <path d="M 250 425 A 175 175 0 0 1 75 250 L 105 250 A 145 145 0 0 0 250 395 Z" fill="url(#gRingLight)"/>
        </g>
        <circle cx="250" cy="250" r="175" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
        <circle cx="250" cy="250" r="174" fill="none" stroke="rgba(0,0,0,0.35)"     stroke-width="1.5"/>
        <circle cx="250" cy="250" r="145" fill="none" stroke="rgba(0,0,0,0.45)"     stroke-width="2"/>
        <circle cx="250" cy="250" r="147" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
        <g stroke="rgba(0,0,0,0.35)" stroke-width="1.5">
          <line x1="75"  y1="250" x2="105" y2="250"/>
          <line x1="425" y1="250" x2="395" y2="250"/>
          <line x1="250" y1="425" x2="250" y2="395"/>
        </g>
        <text class="seg-text"><textPath href="#topArc" startOffset="50%" text-anchor="middle">Pre-Use-Design/Herstellung</textPath></text>
        <text class="seg-text"><textPath href="#rightArc" startOffset="50%" text-anchor="middle">Use-Nutzung</textPath></text>
        <text class="seg-text"><textPath href="#leftArc" startOffset="50%" text-anchor="middle">Post-Use-Lebensende</textPath></text>
      </g>

      <!-- glow copy (blurred, behind) + sharp trace on top -->
      <circle class="trace-glow" cx="250" cy="250" r="160" pathLength="1005" transform="rotate(-90 250 250)"/>
      <circle class="trace"      cx="250" cy="250" r="160" pathLength="1005" transform="rotate(-90 250 250)"/>
    </g>

    <!-- 3D BUILDING -->
    <g class="building" transform="translate(150, 175)">
      <ellipse cx="110" cy="152" rx="120" ry="14" fill="url(#gShadow)"/>
      <polygon fill="url(#gSide)"  points="135,45 157,31 157,136 135,150"/>
      <polygon fill="url(#gRoof)"  points="97,45 119,31 157,31 135,45"/>
      <polygon fill="url(#gFront)" points="97,45 135,45 135,150 97,150"/>
      <line class="mullion" x1="97" y1="71"  x2="135" y2="71"/>
      <line class="mullion" x1="97" y1="97"  x2="135" y2="97"/>
      <line class="mullion" x1="97" y1="123" x2="135" y2="123"/>
      <line class="mullion" x1="116" y1="45" x2="116" y2="150"/>
      <line class="mullion-side" x1="135" y1="71"  x2="157" y2="57"/>
      <line class="mullion-side" x1="135" y1="97"  x2="157" y2="83"/>
      <line class="mullion-side" x1="135" y1="123" x2="157" y2="109"/>
      <polyline class="edge" points="97,45 119,31 157,31 157,136 135,150"/>
      <polyline class="edge" points="97,45 135,45 135,150"/>
      <polygon fill="url(#gSide)"  points="200,108 222,94 222,136 200,150"/>
      <polygon fill="url(#gRoof)"  points="135,108 157,94 222,94 200,108"/>
      <polygon fill="url(#gFront)" points="135,108 200,108 200,150 135,150"/>
      <rect fill="#2a353d" stroke="#c4d4dd" stroke-width=".9" x="148" y="122" width="20" height="28"/>
      <line class="mullion" x1="158" y1="122" x2="158" y2="150"/>
      <rect fill="#2a353d" stroke="#c4d4dd" stroke-width=".9" x="176" y="122" width="16" height="28"/>
      <polyline class="edge" points="135,108 157,94 222,94 222,136 200,150"/>
      <polyline class="edge" points="135,108 200,108 200,150"/>
      <polygon fill="url(#gSide)"  points="75,12 97,-2 97,136 75,150"/>
      <polygon fill="url(#gRoof)"  points="10,12 32,-2 97,-2 75,12"/>
      <polygon fill="url(#gFront)" points="10,12 75,12 75,150 10,150"/>
      <line class="mullion" x1="10" y1="39"  x2="75" y2="39"/>
      <line class="mullion" x1="10" y1="66"  x2="75" y2="66"/>
      <line class="mullion" x1="10" y1="93"  x2="75" y2="93"/>
      <line class="mullion" x1="10" y1="120" x2="75" y2="120"/>
      <line class="mullion" x1="31.6" y1="12" x2="31.6" y2="150"/>
      <line class="mullion" x1="53.3" y1="12" x2="53.3" y2="150"/>
      <line class="mullion-side" x1="75" y1="39"  x2="97" y2="25"/>
      <line class="mullion-side" x1="75" y1="66"  x2="97" y2="52"/>
      <line class="mullion-side" x1="75" y1="93"  x2="97" y2="79"/>
      <line class="mullion-side" x1="75" y1="120" x2="97" y2="106"/>
      <polyline class="edge" points="10,12 32,-2 97,-2 97,136 75,150"/>
      <polyline class="edge" points="10,12 75,12 75,150"/>
      <line class="edge" x1="10" y1="12" x2="10" y2="150"/>
    </g>

    <!-- BRAND TEXT (each line has its own timing via CSS) -->
    <g class="brand">
      <text class="brand-title" x="250" y="485">RE Tool</text>
      <text class="brand-sub"   x="250" y="512">by Nachhaltiges Bauen</text>
    </g>
  </svg>

  <canvas id="particles"></canvas>
</div>

<script>
const stage  = document.getElementById('stage');
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');

stage.classList.add('reveal-ring');

const W = 900, H = 940;
const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
canvas.width  = W * dpr;
canvas.height = H * dpr;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

const SCALE = 600 / 500;
const BX = 150, BY = 175;
const OFFX = 150, OFFY = 150;
function toCanvas(bx, by) {
  return { x: (BX + bx) * SCALE + OFFX, y: (BY + by) * SCALE + OFFY };
}

/* Pre-rendered glow sprite — shine baked in (single draw per particle) */
const SPRITE = 48;
const glow = document.createElement('canvas');
glow.width = glow.height = SPRITE;
const gctx = glow.getContext('2d');
const grad = gctx.createRadialGradient(SPRITE/2, SPRITE/2, 0, SPRITE/2, SPRITE/2, SPRITE/2);
grad.addColorStop(0,    'rgba(255,255,255,1)');
grad.addColorStop(0.10, 'rgba(255,255,255,1)');
grad.addColorStop(0.30, 'rgba(220,242,255,0.85)');
grad.addColorStop(0.6,  'rgba(150,195,225,0.35)');
grad.addColorStop(1,    'rgba(150,195,225,0)');
gctx.fillStyle = grad;
gctx.fillRect(0, 0, SPRITE, SPRITE);

const targets = [];
function fillRect(x0, y0, x1, y1, count) {
  for (let i = 0; i < count; i++) {
    targets.push(toCanvas(x0 + Math.random()*(x1-x0), y0 + Math.random()*(y1-y0)));
  }
}
fillRect(10, -2, 97, 150, 70);
fillRect(97, 31, 157, 150, 45);
fillRect(135, 94, 222, 150, 38);
fillRect(10, -2, 97, 12, 12);
fillRect(97, 31, 157, 45, 7);
fillRect(135, 94, 222, 108, 7);

/* Particles start scattered INSIDE the circle */
const cx = 250 * SCALE + OFFX;
const cy = 280 * SCALE + OFFY;
const particles = targets.map(t => {
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.sqrt(Math.random()) * 465;   // inside the ring
  return {
    x: cx + Math.cos(angle) * dist,
    y: cy + Math.sin(angle) * dist,
    tx: t.x, ty: t.y,
    size: 6 + Math.random() * 8,
    delay: Math.random() * 0.5
  };
});

const easeOut = t => 1 - Math.pow(1 - t, 3);

const START_DELAY = 0;
const DURATION    = 3000;
let startTime = null;
let canvasFade = 1;

function frame(now) {
  if (!startTime) startTime = now;
  const elapsed = now - startTime;
  ctx.clearRect(0, 0, W, H);

  if (elapsed < START_DELAY) { requestAnimationFrame(frame); return; }

  const phase = Math.min((elapsed - START_DELAY) / DURATION, 1);

  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    let local = (phase - p.delay) / (1 - p.delay);
    local = local < 0 ? 0 : local > 1 ? 1 : local;
    const e = easeOut(local);

    const x = p.x + (p.tx - p.x) * e;
    const y = p.y + (p.ty - p.y) * e;
    const alpha = (0.55 + 0.8 * (1 - Math.abs(local - 0.5) * 2)) * canvasFade;
    const s = p.size * (1.4 + (1 - local) * 0.7);

    ctx.globalAlpha = alpha < 1 ? alpha : 1;
    ctx.drawImage(glow, x - s/2, y - s/2, s, s);
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  if (phase > 0.7 && !stage.classList.contains('reveal-on')) {
    stage.classList.add('reveal-on');
  }

  if (phase > 0.85) {
    canvasFade -= 0.04;
    if (canvasFade <= 0) { canvas.style.display = 'none'; return; }
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
<script>
  /* ─── RE Tool redirect — play once per session (matches Compass) ─── */
  (function () {
    const DESTINATION = "REtool/index.html";
    const AUTO_EXIT_MS = 4200;

    // ── FAST PATH — already seen the ceremony this session ──
    const seen = sessionStorage.getItem("retool-introduced");
    if (seen) {
      sessionStorage.setItem("retool-handoff", Date.now().toString());
      window.location.replace(DESTINATION);
      return;
    }

    // ── FIRST VISIT — full ceremony ──
    let exited = false;
    function go() {
      if (exited) return;
      exited = true;
      sessionStorage.setItem("retool-introduced", "1");
      sessionStorage.setItem("retool-handoff", Date.now().toString());
      document.body.style.transition = "opacity 0.5s ease";
      document.body.style.opacity = "0";
      setTimeout(() => window.location.replace(DESTINATION), 500);
    }

    const timer = setTimeout(go, AUTO_EXIT_MS);

    // Click / key to skip
    document.addEventListener("click", () => { clearTimeout(timer); go(); });
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " " || e.key === "Escape") {
        clearTimeout(timer); go();
      }
    });

    // Reduced motion → go quickly
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      clearTimeout(timer);
      sessionStorage.setItem("retool-introduced", "1");
      sessionStorage.setItem("retool-handoff", Date.now().toString());
      setTimeout(go, 600);
    }
  })();
</script>
</body>
</html>
